<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengumuman Kelulusan PKBM</title>
  <style>
    body {
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
      text-align: center;
      padding: 20px;
      margin: 0;
      background-color: #f0f2f5;
      color: #333;
    }

    .container {
      width: 95%;
      max-width: 500px;
      margin: 20px auto;
      border: 1px solid #ddd;
      padding: 25px;
      background-color: #fff;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      box-sizing: border-box;
    }

    .logo-img {
      width: 90px;
      height: auto;
      display: block;
      margin: 0 auto 15px auto;
    }

    h3 {
      font-size: 1.1rem;
      line-height: 1.4;
      margin-bottom: 5px;
    }

    input {
      padding: 12px;
      width: 100%;
      max-width: 300px;
      margin-top: 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
      outline: none;
    }

    button {
      padding: 12px 30px;
      margin-top: 15px;
      background-color: #2980b9;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
      max-width: 300px;
      font-weight: bold;
    }

    hr {
      margin: 20px 0;
      border: 0;
      border-top: 1px solid #eee;
    }

    #hasil {
      margin-top: 15px;
    }

    /* Kotak Hasil Pengumuman */
    .box-hasil {
      padding: 20px;
      border-radius: 10px;
      border: 2px solid #27ae60;
      background-color: #f9fffb;
    }

    .nama-siswa {
      font-size: 18px;
      font-weight: bold;
      display: block;
      margin-bottom: 10px;
      color: #2c3e50;
    }

    .status-lulus {
      font-size: 22px;
      color: #27ae60;
      font-weight: bold;
      text-transform: uppercase;
    }

    .error-msg {
      color: #e74c3c;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <img src="pkbm.png" alt="Logo PKBM" class="logo-img" width="200px">

  <h3>
    Pengumuman Kelulusan Paket C<br>
    PKBM Darussalam TP. 2025/2026<br>
    <small style="color: #777;">Kota Pekalongan</small>
  </h3>

  <hr>
 <p>Selasa, 5 Mei 2026</p>
  <p><b>Assalamualaikum wr.wb.</b></p>
  <p>Masukkan NISN untuk melihat keterangan:</p>
  <input type="number" id="nisnInput" placeholder="Contoh: 001111" onkeypress="if(event.key==='Enter') cek()">
  <br>
  <button onclick="cek()">Cek Hasil</button>

  <hr>

  <div id="hasil"></div>
</div>

<script>
let dataSiswa = [];

// Mengambil data dari data2.txt
fetch('data2.txt')
  .then(res => res.text())
  .then(text => {
    let baris = text.trim().split('\n');
    dataSiswa = baris.map(item => {
      let kolom = item.split(',');
      return {
        nisn: kolom[0] ? kolom[0].trim() : "",
        nama: kolom[1] ? kolom[1].trim() : "",
        ket:  kolom[2] ? kolom[2].trim() : "" // Kolom ke-3 (Keterangan)
      };
    });
  })
  .catch(err => {
    console.error("Gagal load file:", err);
  });

function cek() {
  let input = document.getElementById("nisnInput").value.trim();
  let display = document.getElementById("hasil");

  if (!input) {
    display.innerHTML = "<span class='error-msg'>Silakan isi NISN!</span>";
    return;
  }

  let siswa = dataSiswa.find(s => s.nisn === input);

  if (siswa) {
    display.innerHTML = `
      <div class="box-hasil">
        <span class="nama-siswa">${siswa.nama}</span>
        <span class="status-lulus">${siswa.ket}</span>
      </div>
    `;
  } else {
    display.innerHTML = "<span class='error-msg'>Data tidak ditemukan.</span>";
  }
}
</script>

</body>
</html>
