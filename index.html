<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengumuman Kelulusan</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background-color: #f4f4f9;
    }
    .container {
      max-width: 600px;
      margin: auto;
      border: 1px solid #ccc;
      padding: 30px;
      background-color: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .logo {
      width: 80px;
      height: 80px;
      border: 2px solid #333;
      border-radius: 50%;
      line-height: 80px;
      margin: 0 auto 20px auto;
      font-weight: bold;
      background-color: #eee;
    }
    input {
      padding: 12px;
      width: 80%;
      margin-top: 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 16px;
    }
    button {
      padding: 10px 25px;
      margin-top: 15px;
      background-color: #2c3e50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #34495e;
    }
    hr {
      margin: 25px 0;
      border: 0;
      border-top: 1px solid #eee;
    }
    #hasil {
      margin-top: 20px;
      min-height: 50px;
      line-height: 1.6;
    }
    .lulus {
      color: #27ae60;
      font-weight: bold;
    }
    .tidak-ada {
      color: #e74c3c;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="logo">LOGO</div>

  <h3>
    Pengumuman Kelulusan Paket C<br>
    PKBM Darussalam TP. 2025/2026<br>
    <small style="font-size: 14px; color: #666;">Jln. Hos Cokroaminoto 399 A Kota Pekalongan</small>
  </h3>

  <hr>

  <p>Selasa, 5 Mei 2026</p>
  <p><b>Assalamualaikum wr.wb.</b></p>
  <p>Silakan masukkan Nomor Induk Siswa Nasional (NISN) Anda untuk mengecek status kelulusan.</p>

  <input type="text" id="nisnInput" placeholder="Contoh: 12345678" onkeypress="handleKeyPress(event)">
  <br>
  <button onclick="cek()">Cek Status</button>

  <hr>

  <div id="hasil"></div>

</div>

<script>
let dataSiswa = [];

// Membaca file data.txt dari Notepad
fetch('data.txt')
  .then(response => {
    if (!response.ok) throw new Error("File data.txt tidak ditemukan!");
    return response.text();
  })
  .then(text => {
    // Membagi teks menjadi baris-baris
    let baris = text.trim().split('\n');
    
    // Memproses tiap baris menjadi objek {nisn, nama}
    dataSiswa = baris.map(item => {
      let bagian = item.split(',');
      return {
        nisn: bagian[0] ? bagian[0].trim() : "",
        nama: bagian[1] ? bagian[1].trim() : ""
      };
    });
    console.log("Data berhasil dimuat:", dataSiswa.length, "siswa");
  })
  .catch(err => {
    console.error(err);
    document.getElementById("hasil").innerHTML = "Error: Gagal memuat data siswa.";
  });

function cek() {
  let inputVal = document.getElementById("nisnInput").value.trim();
  let display = document.getElementById("hasil");

  if (inputVal === "") {
    display.innerHTML = "<span class='tidak-ada'>Masukkan NISN terlebih dahulu!</span>";
    return;
  }

  // Cari NISN yang cocok
  let siswa = dataSiswa.find(s => s.nisn === inputVal);

  if (siswa) {
    display.innerHTML = `
      <div class="lulus">
        <span style="font-size: 18px;">${siswa.nama}</span><br>
        <span style="font-size: 24px;">SELAMAT, ANDA LULUS! 🎉</span>
      </div>
    `;
  } else {
    display.innerHTML = `
      <div class="tidak-ada">
        Data NISN <b>${inputVal}</b> tidak ditemukan.<br>
        Pastikan nomor yang dimasukkan benar.
      </div>
    `;
  }
}

// Fungsi agar bisa tekan "Enter" untuk cek
function handleKeyPress(e) {
  if (e.key === 'Enter') {
    cek();
  }
}
</script>

</body>
</html>
