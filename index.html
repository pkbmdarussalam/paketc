<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengumuman Kelulusan PKBM</title>
  <style>
    /* Dasar Layout */
    body {
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
      text-align: center;
      padding: 20px;
      margin: 0;
      background-color: #f0f2f5;
      color: #333;
    }

    .container {
      width: 95%; /* Lebar hampir full di HP */
      max-width: 500px; /* Lebar maksimal di PC */
      margin: 20px auto;
      border: 1px solid #ddd;
      padding: 20px;
      background-color: #fff;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      box-sizing: border-box; /* Agar padding tidak merusak lebar */
    }

    /* Styling Logo */
    .logo-container {
      margin-bottom: 15px;
    }
    .logo-img {
      width: 80px; /* Ukuran pas untuk layar HP */
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* Teks Header */
    h3 {
      font-size: 1.1rem;
      line-height: 1.4;
      margin-bottom: 10px;
    }
    small {
      display: block;
      margin-top: 5px;
      color: #777;
    }

    /* Input dan Tombol */
    input {
      padding: 12px;
      width: 100%; /* Full lebar container */
      max-width: 300px;
      margin-top: 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px; /* Mencegah auto-zoom di iPhone */
      box-sizing: border-box;
      outline: none;
    }
    input:focus {
      border-color: #3498db;
    }

    button {
      padding: 12px 30px;
      margin-top: 15px;
      background-color: #2980b9;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      width: 100%; /* Tombol lebar di HP agar mudah ditekan jari */
      max-width: 300px;
      font-weight: bold;
      transition: background 0.3s;
    }
    button:active {
      background-color: #1c5980;
      transform: scale(0.98);
    }

    hr {
      margin: 20px 0;
      border: 0;
      border-top: 1px solid #eee;
    }

    /* Hasil Pengumuman */
    #hasil {
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
    }
    .lulus {
      color: #27ae60;
      background-color: #eafaf1;
      padding: 15px;
      border: 1px solid #27ae60;
    }
    .tidak-ada {
      color: #e74c3c;
      font-size: 14px;
    }

    /* Penyesuaian khusus layar sangat kecil */
    @media (max-width: 360px) {
      h3 { font-size: 1rem; }
      body { padding: 10px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="logo-container">
    <img src="pkbm.png" alt="Logo PKBM" class="logo-img" width="200">
  </div>

  <h3>
    Pengumuman Kelulusan Paket C<br>
    PKBM Darussalam TP. 2025/2026<br>
    <small>Kota Pekalongan</small>
  </h3>

  <hr>

 <p>Selasa, 5 Mei 2026</p>
  <p><b>Assalamualaikum wr.wb.</b></p>
  <p>Silakan masukkan Nomor Induk Siswa Nasional (NISN) Anda untuk mengecek status kelulusan.</p>
  
  <p><b>Cek Status Kelulusan</b></p>

  <input type="number" id="nisnInput" placeholder="Masukkan NISN Anda" pattern="\d*">
  <br>
  <button onclick="cek()">Cek Sekarang</button>

  <hr>

  <div id="hasil"></div>
</div>

<script>
let dataSiswa = [];

// Load data dari notepad
fetch('data.txt')
  .then(response => response.text())
  .then(text => {
    let baris = text.trim().split('\n');
    dataSiswa = baris.map(item => {
      let bagian = item.split(',');
      return {
        nisn: bagian[0] ? bagian[0].trim() : "",
        nama: bagian[1] ? bagian[1].trim() : ""
      };
    });
  })
  .catch(err => {
    document.getElementById("hasil").innerHTML = "Gagal memuat data.";
  });

function cek() {
  let inputVal = document.getElementById("nisnInput").value.trim();
  let display = document.getElementById("hasil");

  if (!inputVal) {
    display.innerHTML = "<span class='tidak-ada'>Isi NISN dulu ya!</span>";
    return;
  }

  let siswa = dataSiswa.find(s => s.nisn === inputVal);

  if (siswa) {
    display.innerHTML = `
      <div class="lulus">
        <strong>${siswa.nama}</strong><br>
        <span style="font-size: 20px;">LULUS 🎉</span>
      </div>
    `;
  } else {
    display.innerHTML = "<span class='tidak-ada'>NISN tidak terdaftar.</span>";
  }
}
</script>

</body>
</html>
